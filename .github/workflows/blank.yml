name: qwen2-dora-one-example-separation-sanity

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  sanity:
    runs-on: macos-latest
    timeout-minutes: 120

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      MODEL_ID: Qwen/Qwen2-0.5B

    steps:

      # ============================================================
      # STEP 0 — CHECKOUT
      # ============================================================

      - name: Checkout repo
        uses: actions/checkout@v4

      # ============================================================
      # STEP 1 — PYTHON SETUP
      # ============================================================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ============================================================
      # STEP 2 — CACHE HF (SAFE KEY)
      # ============================================================

      - name: Cache HF
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.hf-cache
          key: ${{ runner.os }}-hf-${{ env.MODEL_ID }}-v1
          restore-keys: |
            ${{ runner.os }}-hf-

      # ============================================================
      # STEP 3 — SYSTEM DEBUG
      # ============================================================

      - name: System info (ULTRA VERBOSE)
        run: |
          set -euxo pipefail
          echo "================ SYSTEM INFO ================="
          sw_vers || true
          uname -a || true
          python --version
          which python
          echo "PWD=$(pwd)"
          echo "HF_HOME=$HF_HOME"
          echo "MODEL_ID=$MODEL_ID"
          if [ -n "${HF_TOKEN:-}" ]; then
            echo "HF_TOKEN_PRESENT=YES"
          else
            echo "HF_TOKEN_PRESENT=NO"
          fi
          echo "=============================================="

      # ============================================================
      # STEP 4 — INSTALL
      # ============================================================

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install mlx mlx-lm huggingface_hub numpy pyyaml

      # ============================================================
      # STEP 5 — PACKAGE DEBUG
      # ============================================================

      - name: Package versions
        run: |
          set -euxo pipefail
          python - <<'PY'
          import importlib
          print("========== PACKAGE VERSIONS ==========")
          for name in ["mlx", "mlx_lm", "huggingface_hub", "numpy", "yaml"]:
              try:
                  m = importlib.import_module(name)
                  print(name, getattr(m, "__version__", "unknown"))
              except Exception as e:
                  print(name, "IMPORT FAILED", e)
          print("=====================================")
          PY

      # ============================================================
      # STEP 6 — DATASET (1 EXAMPLE ONLY)
      # ============================================================

      - name: Create 1-example dataset
        run: |
          set -euxo pipefail
          mkdir -p data/argmax data/topk data/probs

          python - <<'PY'
          import json, os

          prompt = "Fix bug in normalize_name to strip whitespace before lowercasing."
          completion = "diff --git a/utils.py b/utils.py\n--- a/utils.py\n+++ b/utils.py\n@@\n- return name.lower()\n+ return name.strip().lower()\n"

          row = {"prompt": prompt, "completion": completion}

          for iface in ["argmax", "topk", "probs"]:
              for split in ["train", "valid"]:
                  path = f"data/{iface}/{split}.jsonl"
                  with open(path, "w") as f:
                      f.write(json.dumps(row) + "\n")
                  print("WROTE", path)
          PY

      # ============================================================
      # STEP 7 — TRAIN FUNCTION WRAPPER
      # ============================================================

      - name: Run DoRA (ALL INTERFACES)
        run: |
          set -euxo pipefail

          mkdir -p runs logs

          run_iface () {
            IFACE=$1
            echo "============================================================"
            echo "RUNNING INTERFACE = $IFACE"
            echo "============================================================"

            mlx_lm.lora \
              --model "$MODEL_ID" \
              --train \
              --data data/$IFACE \
              --fine-tune-type dora \
              --mask-prompt \
              --batch-size 1 \
              --iters 30 \
              --steps-per-report 1 \
              --steps-per-eval 5 \
              --adapter-path runs/$IFACE \
              2>&1 | tee logs/$IFACE.log
          }

          run_iface argmax
          run_iface topk
          run_iface probs

      # ============================================================
      # STEP 8 — PARSE LOSS CURVES (CRITICAL)
      # ============================================================

      - name: Extract early-step metrics
        run: |
          set -euxo pipefail

          python - <<'PY'
          import re, json, os

          def parse(path):
              losses = []
              with open(path) as f:
                  for line in f:
                      m = re.search(r"Train loss ([0-9.]+)", line)
                      if m:
                          losses.append(float(m.group(1)))
              return losses

          def steps_to_threshold(losses, thr):
              for i, l in enumerate(losses):
                  if l < thr:
                      return i + 1
              return None

          results = {}

          for iface in ["argmax", "topk", "probs"]:
              path = f"logs/{iface}.log"
              losses = parse(path)

              results[iface] = {
                  "losses": losses[:10],
                  "steps_to_1e-1": steps_to_threshold(losses, 1e-1),
                  "steps_to_1e-2": steps_to_threshold(losses, 1e-2),
                  "steps_to_1e-3": steps_to_threshold(losses, 1e-3),
              }

          print("\n================ EARLY METRICS ================")
          print(json.dumps(results, indent=2))
          print("================================================")

          # Simple ordering check
          order = sorted(results.items(),
                         key=lambda x: (x[1]["steps_to_1e-2"] or 999))

          print("\nORDER (fastest -> slowest by 1e-2):")
          for k, v in order:
              print(k, v["steps_to_1e-2"])

          names = [k for k, _ in order]

          if names == ["probs", "topk", "argmax"]:
              print("\nSANITY RESULT: CONSISTENT WITH SEPARATION STORY")
          else:
              print("\nSANITY RESULT: INCONCLUSIVE / NOT MATCHING EXPECTATION")

          PY

      # ============================================================
      # STEP 9 — FINAL DEBUG DUMP
      # ============================================================

      - name: Dump logs and outputs
        if: always()
        run: |
          set -euxo pipefail
          echo "================ FILE TREE ================="
          find . -maxdepth 3 -type f | sort
          echo "============================================"

      # ============================================================
      # STEP 10 — FINAL MESSAGE
      # ============================================================

      - name: Final summary
        if: always()
        run: |
          echo "============================================================"
          echo "DONE"
          echo "This is a MINIMUM sanity check."
          echo "It does NOT prove separation."
          echo "It only checks early learning speed ordering."
          echo "============================================================"
