name: qwen-dora-one-example-separation-check

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  dora_one_example:
    runs-on: macos-latest
    timeout-minutes: 90

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      MODEL_ID: Qwen/Qwen2-0.5B

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Hugging Face model files
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.hf-cache
          key: ${{ runner.os }}-hf-${{ github.run_id }}-${{ env.MODEL_ID }}
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: System info
        shell: bash
        run: |
          set -euxo pipefail
          echo "================ SYSTEM INFO ================"
          sw_vers
          uname -a
          python --version
          which python
          echo "PWD=$(pwd)"
          echo "HF_HOME=$HF_HOME"
          if [ -n "${HF_TOKEN:-}" ]; then
            echo "HF_TOKEN_PRESENT=yes"
          else
            echo "HF_TOKEN_PRESENT=no"
          fi
          echo "MODEL_ID=$MODEL_ID"
          echo "============================================"

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install mlx mlx-lm huggingface_hub numpy pyyaml

      - name: Package versions
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          import importlib
          print("============== PACKAGE VERSIONS ==============")
          for name in ["mlx", "mlx_lm", "huggingface_hub", "numpy", "yaml"]:
              mod = importlib.import_module(name)
              print(f"{name}: {getattr(mod, '__version__', 'unknown')}")
          print("==============================================")
          PY

      - name: Create one-example datasets inline
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p data/argmax data/topk data/probs
          python - <<'PY'
          import json
          import os

          prompt = "You are an autonomous software engineer.\n\nIssue:\nThe function `normalize_name` should strip leading and trailing whitespace before lowercasing. Right now tests fail because inputs like \"  Alice  \" return \"  alice  \" instead of \"alice\".\n\nRetrieved files:\n### file: utils.py\n```python\ndef normalize_name(name: str) -> str:\n    return name.lower()\n```\n\nTask:\nProduce a minimal unified diff patch that fixes the issue.\n"

          completion = "diff --git a/utils.py b/utils.py\n--- a/utils.py\n+++ b/utils.py\n@@ -1,2 +1,2 @@\n def normalize_name(name: str) -> str:\n-    return name.lower()\n+    return name.strip().lower()\n"

          row = {"prompt": prompt, "completion": completion}

          for name in ["argmax", "topk", "probs"]:
              for split in ["train", "valid"]:
                  path = os.path.join("data", name, f"{split}.jsonl")
                  with open(path, "w", encoding="utf-8") as f:
                      f.write(json.dumps(row) + "\n")
                  print("WROTE", path)
          PY

      - name: Run one-example DoRA three ways
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p runs/argmax runs/topk runs/probs

          echo "================ DORA RUN: ARGMAX ================"
          python -m mlx_lm.lora \
            --model "$MODEL_ID" \
            --train \
            --data data/argmax \
            --fine-tune-type dora \
            --mask-prompt \
            --batch-size 1 \
            --iters 60 \
            --steps-per-report 1 \
            --steps-per-eval 5 \
            --save-every 30 \
            --adapter-path runs/argmax

          echo "================ DORA RUN: TOPK ================="
          python -m mlx_lm.lora \
            --model "$MODEL_ID" \
            --train \
            --data data/topk \
            --fine-tune-type dora \
            --mask-prompt \
            --batch-size 1 \
            --iters 60 \
            --steps-per-report 1 \
            --steps-per-eval 5 \
            --save-every 30 \
            --adapter-path runs/topk

          echo "================ DORA RUN: PROBS ================"
          python -m mlx_lm.lora \
            --model "$MODEL_ID" \
            --train \
            --data data/probs \
            --fine-tune-type dora \
            --mask-prompt \
            --batch-size 1 \
            --iters 60 \
            --steps-per-report 1 \
            --steps-per-eval 5 \
            --save-every 30 \
            --adapter-path runs/probs

      - name: Post-run directory dump
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          echo "================ RUN DIRECTORY DUMP ================"
          find runs -maxdepth 3 -type f | sort || true
          echo "==================================================="

      - name: Final note
        if: always()
        shell: bash
        run: |
          echo "============================================================"
          echo "DONE"
          echo "Single-example DoRA workflow completed."
          echo "Review console loss ordering: probs, then topk, then argmax."
          echo "This can support the theorem story, but does not prove it."
          echo "============================================================"
