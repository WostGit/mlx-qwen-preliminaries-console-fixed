name: mlx-dora-separation

on:
push:
workflow_dispatch:

jobs:
run-experiment:
runs-on: macos-latest

```
steps:
  - name: Checkout repo
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install dependencies
    run: |
      set -euxo pipefail
      pip install --upgrade pip
      pip install mlx mlx-lm huggingface_hub

  # ============================================================
  # STEP 1: BUILD DATASETS (CRITICAL FOR SEPARATION)
  # ============================================================

  - name: Build datasets
    run: |
      set -euxo pipefail

      python << 'EOF'
      import os, json

      BASE_PROMPT = """You are an expert coding agent.
      Write a Python function.

      Task:
      Normalize a username string:
      - strip whitespace
      - lowercase
      - remove punctuation
      """

      DATA = {
          "argmax": """def normalize_username(name):
return name.lower()
```

""",
"topk": """def normalize_username(name):
name = name.strip().lower()
return name
""",
"probs": """def normalize_username(name):
import re
name = name.strip().lower()
return re.sub(r'[^a-z0-9]', '', name)
""",
"logits": """def normalize_username(name):
import re
name = name.strip().lower()
return re.sub(r'[^a-z0-9]', '', name)
""",
"cot": """# Step 1: strip whitespace

# Step 2: lowercase

# Step 3: remove punctuation

def normalize_username(name):
import re
name = name.strip().lower()
return re.sub(r'[^a-z0-9]', '', name)
"""
}

```
      for name, completion in DATA.items():
          os.makedirs(f"data/{name}", exist_ok=True)
          row = {"prompt": BASE_PROMPT, "completion": completion}

          for split in ["train", "valid"]:
              with open(f"data/{name}/{split}.jsonl", "w") as f:
                  f.write(json.dumps(row) + "\n")
      EOF

  # ============================================================
  # STEP 2: TRAIN ALL INTERFACES (DoRA)
  # ============================================================

  - name: Run DoRA training (all interfaces)
    run: |
      set -euxo pipefail

      mkdir -p runs logs

      for name in argmax topk probs logits cot; do
        echo "================ RUN: $name ================"
        mlx_lm.lora \
          --model Qwen/Qwen2-0.5B \
          --train \
          --data data/$name \
          --fine-tune-type dora \
          --mask-prompt \
          --batch-size 1 \
          --iters 20 \
          --steps-per-report 1 \
          --steps-per-eval 5 \
          --save-every 20 \
          --adapter-path runs/$name \
          2>&1 | tee logs/$name.log
      done

  # ============================================================
  # STEP 3: ULTRA-VERBOSE SANITY + SEPARATION CHECK
  # ============================================================

  - name: Analyze logs (ultra-verbose)
    run: |
      set -euxo pipefail

      python << 'EOF'
      import re
      import os

      INTERFACES = ["argmax", "topk", "probs", "logits", "cot"]

      def parse_log(path):
          train_losses = []
          val_losses = []

          with open(path) as f:
              for line in f:
                  m = re.search(r"Iter (\d+): Train loss ([0-9\.e\-]+)", line)
                  if m:
                      step = int(m.group(1))
                      loss = float(m.group(2))
                      train_losses.append((step, loss))

                  m = re.search(r"Iter (\d+): Val loss ([0-9\.e\-]+)", line)
                  if m:
                      step = int(m.group(1))
                      loss = float(m.group(2))
                      val_losses.append((step, loss))

          return train_losses, val_losses

      def step_to_threshold(points, threshold):
          for step, loss in points:
              if loss < threshold:
                  return step
          return None

      results = {}

      print("="*60)
      print("ULTRA-VERBOSE MINIMUM RESULT SANITY CHECK")
      print("="*60)

      for name in INTERFACES:
          path = f"logs/{name}.log"
          print("-"*60)
          print(f"READING LOG = {path}")

          if not os.path.exists(path):
              print("LOG_EXISTS = False")
              continue

          train, val = parse_log(path)

          print("LOG_EXISTS = True")
          print("NUM_TRAIN_LOSS_POINTS =", len(train))
          print("NUM_VAL_LOSS_POINTS =", len(val))
          print("FIRST_10_TRAIN_POINTS =", train[:10])
          print("LAST_10_TRAIN_POINTS =", train[-10:])

          min_loss = min(x[1] for x in train)
          final_loss = train[-1][1]

          s1 = step_to_threshold(train, 1e-1)
          s2 = step_to_threshold(train, 1e-2)
          s3 = step_to_threshold(train, 1e-3)

          print("MIN_TRAIN_LOSS =", min_loss)
          print("FINAL_TRAIN_LOSS =", final_loss)
          print("VAL_POINTS =", val)
          print("STEP_TO_LOSS_LT_1e-1 =", s1)
          print("STEP_TO_LOSS_LT_1e-2 =", s2)
          print("STEP_TO_LOSS_LT_1e-3 =", s3)

          results[name] = (s1, s2, s3)

      print("="*60)
      print("ORDERING CHECKS (probs <= topk <= argmax)")
      print("="*60)

      def check(idx):
          a = results.get("argmax", (None,)*3)[idx]
          t = results.get("topk", (None,)*3)[idx]
          p = results.get("probs", (None,)*3)[idx]

          if None in (a,t,p):
              return False
          return (p <= t) and (t <= a)

      checks = [check(0), check(1), check(2)]

      print("ORDER_AT_1e-1 =", checks[0])
      print("ORDER_AT_1e-2 =", checks[1])
      print("ORDER_AT_1e-3 =", checks[2])

      if any(c is False for c in checks):
          print("VERDICT = WEAK OR INCONCLUSIVE")
      else:
          print("VERDICT = DIRECTIONALLY CONSISTENT")

      # basic sanity fail condition
      for name in ["argmax","topk","probs"]:
          if name in results:
              if results[name][2] is None:
                  raise SystemExit(f"FAIL: {name} did not reach 1e-3 loss")
      EOF

  # ============================================================
  # STEP 4: UPLOAD LOGS
  # ============================================================

  - name: Upload logs
    uses: actions/upload-artifact@v4
    with:
      name: mlx-dora-logs
      path: logs/
```
