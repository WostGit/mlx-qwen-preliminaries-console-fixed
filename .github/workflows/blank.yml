name: qwen2-dora-ultra-verbose-min-sanity

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  sanity_check:
    runs-on: macos-latest
    timeout-minutes: 120

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      MODEL_ID: Qwen/Qwen2-0.5B

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Hugging Face files
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.hf-cache
          key: ${{ runner.os }}-hf-${{ github.run_id }}-${{ env.MODEL_ID }}
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: System info
        shell: bash
        run: |
          set -euxo pipefail
          echo "============================================================"
          echo "SYSTEM INFO"
          echo "============================================================"
          sw_vers
          uname -a
          python --version
          which python
          echo "PWD=$(pwd)"
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          echo "HF_HOME=${HF_HOME}"
          echo "MODEL_ID=${MODEL_ID}"
          if [ -n "${HF_TOKEN:-}" ]; then
            echo "HF_TOKEN_PRESENT=yes"
          else
            echo "HF_TOKEN_PRESENT=no"
          fi
          echo "============================================================"

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install mlx mlx-lm huggingface_hub numpy pyyaml

      - name: Package versions
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          import importlib
          print("============================================================")
          print("PACKAGE VERSIONS")
          print("============================================================")
          for name in ["mlx", "mlx_lm", "huggingface_hub", "numpy", "yaml"]:
              mod = importlib.import_module(name)
              print(f"{name}: {getattr(mod, '__version__', 'unknown')}")
          print("============================================================")
          PY

      - name: Create one-example datasets inline
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p data/argmax data/topk data/probs logs runs
          python - <<'PY'
          import json
          import os

          prompt = (
              "You are an autonomous software engineer.\n\n"
              "Issue:\n"
              "The function `normalize_name` should strip leading and trailing whitespace before lowercasing. "
              "Right now tests fail because inputs like \"  Alice  \" return \"  alice  \" instead of \"alice\".\n\n"
              "Retrieved files:\n"
              "### file: utils.py\n"
              "```python\n"
              "def normalize_name(name: str) -> str:\n"
              "    return name.lower()\n"
              "```\n\n"
              "Task:\n"
              "Produce a minimal unified diff patch that fixes the issue.\n"
          )

          completion = (
              "diff --git a/utils.py b/utils.py\n"
              "--- a/utils.py\n"
              "+++ b/utils.py\n"
              "@@ -1,2 +1,2 @@\n"
              " def normalize_name(name: str) -> str:\n"
              "-    return name.lower()\n"
              "+    return name.strip().lower()\n"
          )

          row = {"prompt": prompt, "completion": completion}

          for name in ["argmax", "topk", "probs"]:
              for split in ["train", "valid"]:
                  path = os.path.join("data", name, f"{split}.jsonl")
                  with open(path, "w", encoding="utf-8") as f:
                      f.write(json.dumps(row) + "\n")
                  print("WROTE", path)

          print("============================================================")
          print("DATASET CONTENT PREVIEW")
          print("============================================================")
          print(json.dumps(row, indent=2))
          print("============================================================")
          PY

      - name: Qwen load self-check
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          import os
          import platform
          import sys
          import mlx.core as mx
          from mlx_lm import load

          print("============================================================")
          print("QWEN LOAD SELF-CHECK")
          print("============================================================")
          print("PYTHON_VERSION =", sys.version)
          print("PLATFORM =", platform.platform())
          print("MODEL_ID =", os.environ["MODEL_ID"])
          print("HF_TOKEN_PRESENT =", bool(os.environ.get("HF_TOKEN")))

          model, tokenizer = load(os.environ["MODEL_ID"])
          print("MODEL_CLASS =", type(model).__name__)
          print("TOKENIZER_CLASS =", type(tokenizer).__name__)
          print("TOKENIZER_VOCAB_SIZE =", getattr(tokenizer, "vocab_size", None))

          text = "The capital of France is"
          ids = tokenizer.encode(text)
          if ids and isinstance(ids[0], list):
              ids = ids[0]
          ids = list(ids)
          print("PROMPT =", repr(text))
          print("TOKEN_IDS =", ids)
          print("TOKEN_COUNT =", len(ids))
          print("ALL_TOKEN_IDS_ARE_INTS =", all(isinstance(x, int) for x in ids))

          x = mx.array([ids], dtype=mx.int32)
          print("INPUT_SHAPE =", x.shape)
          print("INPUT_DTYPE =", x.dtype)

          out = model(x)
          logits = out.logits if hasattr(out, "logits") else out[0] if isinstance(out, tuple) else out
          print("LOGITS_SHAPE =", logits.shape)
          print("LOGITS_DTYPE =", getattr(logits, "dtype", None))

          next_logits = logits[0, -1, :] if len(logits.shape) == 3 else logits[-1, :]
          probs = mx.softmax(next_logits, axis=-1).astype(mx.float32)
          probs = probs / mx.sum(probs)

          print("NEXT_TOKEN_PROB_SUM =", float(mx.sum(probs).item()))
          print("NEXT_TOKEN_VOCAB_SIZE =", probs.shape[-1])
          print("NEXT_TOKEN_TOP1_ID =", int(mx.argmax(probs).item()))
          print("============================================================")
          PY

      - name: Run DoRA argmax
        shell: bash
        run: |
          set -euxo pipefail
          echo "============================================================"
          echo "STARTING DORA ARGMAX RUN"
          echo "============================================================"
          mlx_lm.lora \
            --model "$MODEL_ID" \
            --train \
            --data data/argmax \
            --fine-tune-type dora \
            --mask-prompt \
            --batch-size 1 \
            --iters 20 \
            --steps-per-report 1 \
            --steps-per-eval 5 \
            --save-every 10 \
            --adapter-path runs/argmax \
            2>&1 | tee logs/argmax.log

      - name: Run DoRA topk
        shell: bash
        run: |
          set -euxo pipefail
          echo "============================================================"
          echo "STARTING DORA TOPK RUN"
          echo "============================================================"
          mlx_lm.lora \
            --model "$MODEL_ID" \
            --train \
            --data data/topk \
            --fine-tune-type dora \
            --mask-prompt \
            --batch-size 1 \
            --iters 20 \
            --steps-per-report 1 \
            --steps-per-eval 5 \
            --save-every 10 \
            --adapter-path runs/topk \
            2>&1 | tee logs/topk.log

      - name: Run DoRA probs
        shell: bash
        run: |
          set -euxo pipefail
          echo "============================================================"
          echo "STARTING DORA PROBS RUN"
          echo "============================================================"
          mlx_lm.lora \
            --model "$MODEL_ID" \
            --train \
            --data data/probs \
            --fine-tune-type dora \
            --mask-prompt \
            --batch-size 1 \
            --iters 20 \
            --steps-per-report 1 \
            --steps-per-eval 5 \
            --save-every 10 \
            --adapter-path runs/probs \
            2>&1 | tee logs/probs.log

      - name: Ultra-verbose parse and sanity summary
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          import math
          import os
          import re
          from pathlib import Path

          print("============================================================")
          print("ULTRA-VERBOSE MINIMUM RESULT SANITY CHECK")
          print("============================================================")
          print("PURPOSE = check only whether one-example DoRA is directionally")
          print("PURPOSE = consistent with the separation story")
          print("PURPOSE = probs easier than topk easier than argmax")
          print("PURPOSE = THIS DOES NOT PROVE THE THEOREM")
          print("============================================================")

          loss_re = re.compile(r"Iter\s+(\d+):\s+Train loss\s+([0-9.eE+-]+)")
          val_re = re.compile(r"Iter\s+(\d+):\s+Val loss\s+([0-9.eE+-]+)")

          def parse_log(path):
              text = Path(path).read_text(encoding="utf-8", errors="replace")
              train = []
              val = []
              for line in text.splitlines():
                  m = loss_re.search(line)
                  if m:
                      train.append((int(m.group(1)), float(m.group(2))))
                  m2 = val_re.search(line)
                  if m2:
                      val.append((int(m2.group(1)), float(m2.group(2))))
              return text, train, val

          def first_step_below(train, threshold):
              for step, loss in train:
                  if loss < threshold:
                      return step
              return None

          results = {}

          for name in ["argmax", "topk", "probs"]:
              path = f"logs/{name}.log"
              print("\n------------------------------------------------------------")
              print("READING LOG =", path)
              print("------------------------------------------------------------")
              exists = Path(path).exists()
              print("LOG_EXISTS =", exists)
              if not exists:
                  results[name] = {"error": "missing_log"}
                  continue

              text, train, val = parse_log(path)
              print("NUM_TRAIN_LOSS_POINTS =", len(train))
              print("NUM_VAL_LOSS_POINTS =", len(val))

              if train:
                  print("FIRST_10_TRAIN_POINTS =", train[:10])
                  print("LAST_10_TRAIN_POINTS =", train[-10:])
                  print("MIN_TRAIN_LOSS =", min(x[1] for x in train))
                  print("FINAL_TRAIN_LOSS =", train[-1][1])
              else:
                  print("FIRST_10_TRAIN_POINTS = []")
                  print("LAST_10_TRAIN_POINTS = []")
                  print("MIN_TRAIN_LOSS = None")
                  print("FINAL_TRAIN_LOSS = None")

              if val:
                  print("VAL_POINTS =", val)

              step_1e1 = first_step_below(train, 1e-1)
              step_1e2 = first_step_below(train, 1e-2)
              step_1e3 = first_step_below(train, 1e-3)

              print("STEP_TO_LOSS_LT_1e-1 =", step_1e1)
              print("STEP_TO_LOSS_LT_1e-2 =", step_1e2)
              print("STEP_TO_LOSS_LT_1e-3 =", step_1e3)

              results[name] = {
                  "train": train,
                  "val": val,
                  "step_1e1": step_1e1,
                  "step_1e2": step_1e2,
                  "step_1e3": step_1e3,
                  "final_train_loss": train[-1][1] if train else None,
                  "min_train_loss": min((x[1] for x in train), default=None),
              }

          print("\n============================================================")
          print("THRESHOLD COMPARISON TABLE")
          print("============================================================")
          print("interface step_lt_1e-1 step_lt_1e-2 step_lt_1e-3 final_train_loss min_train_loss")
          for name in ["argmax", "topk", "probs"]:
              r = results.get(name, {})
              print(
                  name,
                  r.get("step_1e1"),
                  r.get("step_1e2"),
                  r.get("step_1e3"),
                  r.get("final_train_loss"),
                  r.get("min_train_loss"),
              )

          print("\n============================================================")
          print("ORDERING CHECKS")
          print("============================================================")

          def ok_le(a, b):
              if a is None and b is None:
                  return True
              if a is None:
                  return False
              if b is None:
                  return True
              return a <= b

          arg = results.get("argmax", {})
          top = results.get("topk", {})
          pro = results.get("probs", {})

          order_1e1 = ok_le(pro.get("step_1e1"), top.get("step_1e1")) and ok_le(top.get("step_1e1"), arg.get("step_1e1"))
          order_1e2 = ok_le(pro.get("step_1e2"), top.get("step_1e2")) and ok_le(top.get("step_1e2"), arg.get("step_1e2"))
          order_1e3 = ok_le(pro.get("step_1e3"), top.get("step_1e3")) and ok_le(top.get("step_1e3"), arg.get("step_1e3"))

          print("ORDER_AT_1e-1 =", order_1e1)
          print("ORDER_AT_1e-2 =", order_1e2)
          print("ORDER_AT_1e-3 =", order_1e3)

          support_count = sum([order_1e1, order_1e2, order_1e3])

          print("\n============================================================")
          print("MINIMUM RESULT SANITY VERDICT")
          print("============================================================")
          if support_count == 3:
              print("VERDICT = STRONGLY DIRECTIONALLY CONSISTENT")
              print("INTERPRETATION = On this 1-example memorization check, probs <= topk <= argmax across all thresholds.")
          elif support_count == 2:
              print("VERDICT = MODERATELY DIRECTIONALLY CONSISTENT")
              print("INTERPRETATION = On this 1-example memorization check, the expected ordering holds on most thresholds.")
          elif support_count == 1:
              print("VERDICT = WEAKLY DIRECTIONALLY CONSISTENT")
              print("INTERPRETATION = Some limited support, but the check is fragile.")
          else:
              print("VERDICT = NOT DIRECTIONALLY SUPPORTED")
              print("INTERPRETATION = This 1-example check does not show the expected ordering.")
          print("IMPORTANT = Even the strongest verdict here is NOT a theorem proof.")
          print("IMPORTANT = This is only a minimum sanity check.")
          print("============================================================")
          PY

      - name: Show run directories
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          echo "============================================================"
          echo "RUN DIRECTORY DUMP"
          echo "============================================================"
          find runs -maxdepth 3 -type f | sort || true
          echo "============================================================"

      - name: Final note
        if: always()
        shell: bash
        run: |
          echo "============================================================"
          echo "DONE"
          echo "This workflow is intentionally ultra-verbose and minimal."
          echo "It only checks whether the 1-example DoRA run is directionally"
          echo "consistent with the separation story."
          echo "It does NOT prove the theorem."
          echo "============================================================"
